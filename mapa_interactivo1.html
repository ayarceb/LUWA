<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Climático Avanzado</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0c0e12; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* Contenedor del Panel de Control Superior Derecho */
        .control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(18, 22, 28, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: #f3f4f6; padding: 20px; border-radius: 12px; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .panel-header { margin-bottom: 12px; }
        .var-badge { display: inline-block; background: #3b82f6; color: white; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .panel-title { font-size: 16px; font-weight: 600; color: #ffffff; margin: 0; line-height: 1.2; }
        .panel-desc { font-size: 12px; color: #9ca3af; margin: 4px 0 0 0; line-height: 1.4; }
        
        /* Sección de Monitoreo en Tiempo Real (Mouse) */
        .probe-section { background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); margin: 15px 0; }
        .probe-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .probe-row:last-child { margin-bottom: 0; }
        .probe-label { color: #6b7280; }
        .probe-value { font-family: monospace; color: #3b82f6; font-weight: bold; }
        .value-highlight { font-size: 14px; color: #10b981 !important; }
        
        /* Barra de Control de Opacidad */
        .control-group { margin-bottom: 15px; font-size: 12px; }
        .control-label { display: flex; justify-content: space-between; color: #9ca3af; margin-bottom: 6px; }
        .slider-input { width: 100%; -webkit-appearance: none; background: #374151; height: 6px; border-radius: 3px; outline: none; cursor: pointer; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
        
        /* Leyenda de Escala Térmica */
        .legend-bar { height: 10px; border-radius: 4px; background: linear-gradient(to right, #0055ff, #00aaff, #ffffff, #ffaa00, #ff0000); border: 1px solid rgba(255,255,255,0.1); margin-top: 4px; }
        
        /* Ajustes estéticos a los botones de Leaflet */
        .leaflet-control-zoom a { background: #12161c !important; color: #f3f4f6 !important; border-color: rgba(255,255,255,0.1) !important; }
        .leaflet-control-attribution { background: rgba(12, 15, 19, 0.8) !important; color: #6b7280 !important; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="panel-header">
            <span class="var-badge">m</span>
            <h3 class="panel-title">altitude</h3>
            <p class="panel-desc">layer height relative to sea level</p>
        </div>
        
        <div class="probe-section">
            <div class="probe-row">
                <span class="probe-label">Posición:</span>
                <span class="probe-value" id="probe-coords">Lat: -- | Lon: --</span>
            </div>
            <div class="probe-row">
                <span class="probe-label">Valor en punto:</span>
                <span class="probe-value value-highlight" id="probe-val">--</span>
            </div>
        </div>

        <div class="control-group">
            <div class="control-label"><span>Transparencia</span><span id="opacity-pct">80%</span></div>
            <input type="range" id="layer-opacity" class="slider-input" min="0" max="100" value="80">
        </div>

        <div class="control-group" style="margin-bottom: 0;">
            <div class="control-label"><span>21.1</span><span>Escala Gradiente</span><span>2940.6</span></div>
            <div class="legend-bar"></div>
        </div>
    </div>

    <div id="map"></div>
