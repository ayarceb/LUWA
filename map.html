<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>LOTOS-EUROS Interactive Map</title>

<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
#controls { padding: 15px; background: #f0f0f0; }
button { margin: 5px; padding: 8px 12px; cursor: pointer; }
#terminal { background: black; color: #00ff00; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; }
#results { padding: 15px; }
video { width: 100%; max-width: 950px; margin-top: 15px; background: black; }
.hidden { display: none; }
</style>
</head>

<body>

<div id="controls">
<h3>Domain Selection</h3>

<button onclick="setMexicoDomain()">Mexico domain</button>
<button onclick="saveDomain()">Save domain</button>
<button onclick="runSimulation()">Run LOTOS ECMWF</button>

<div id="domainInfo"></div>
</div>

<div id="terminal"></div>

<div id="results" class="hidden">
<h3>Results</h3>

<div id="mexicoButtons" class="hidden">
<button onclick="showMexicoVideo('no2')">NO2</button>
<button onclick="showMexicoVideo('o3')">O3</button>
<button onclick="showMexicoVideo('so2')">SO2</button>
<button onclick="showMexicoVideo('tpm25')">TPM25</button>
</div>

<div id="videoContainer"></div>
</div>

<script>

let currentDomain = null;
let savedDomain = null;

function setMexicoDomain() {
    currentDomain = {
        name: "Mexico",
        west: -101.0,
        south: 16.0,
        dlon: 0.2,
        dlat: 0.2,
        nx: 60,
        ny: 35
    };

    document.getElementById("domainInfo").innerHTML =
        "<b>Mexico domain selected</b><br>" +
        "Lon: [-101,-89] | Lat: [16,23]<br>" +
        "Resolution: 0.2 x 0.2<br>" +
        "Grid: 60 x 35";
}

function saveDomain() {
    if (!currentDomain) {
        alert("Select a domain first.");
        return;
    }
    savedDomain = currentDomain;
    alert("Domain saved.");
}

function runSimulation() {

    if (!savedDomain) {
        alert("Save a domain before running.");
        return;
    }

    clearResults();
    const terminal = document.getElementById("terminal");
    terminal.innerHTML = "";

    const lines = [
        "Initializing LOTOS-EUROS...",
        "Loading ECMWF meteorology...",
        "Configuring grid...",
        "Running transport solver...",
        "Writing output files...",
        "Simulation complete."
    ];

    let i = 0;

    const interval = setInterval(() => {
        terminal.innerHTML += lines[i] + "<br>";
        terminal.scrollTop = terminal.scrollHeight;
        i++;

        if (i >= lines.length) {
            clearInterval(interval);
            showResults();
        }

    }, 800);
}

function showResults() {
    document.getElementById("results").classList.remove("hidden");
    if (savedDomain.name === "Mexico") {
        document.getElementById("mexicoButtons").classList.remove("hidden");
    }
}

function clearResults() {
    document.getElementById("results").classList.add("hidden");
    document.getElementById("mexicoButtons").classList.add("hidden");
    document.getElementById("videoContainer").innerHTML = "";
}

function showMexicoVideo(variable) {

    const container = document.getElementById("videoContainer");
    container.innerHTML = "";

    let fileMap = {
        "no2": "no_LE_model_conc-3d_20240702.mp4",
        "o3": "o3_LE_model_conc-3d_20240702.mp4",
        "so2": "so2_LE_model_conc-3d_20240702.mp4",
        "tpm25": "tpm25_LE_model_conc-3d_20240702.mp4"
    };

    const videoPath = fileMap[variable];

    const video = document.createElement("video");
    video.controls = true;
    video.preload = "auto";
    video.width = 950;

    const source = document.createElement("source");
    source.src = videoPath;
    source.type = "video/mp4";

    video.appendChild(source);
    container.appendChild(video);

    video.load();

    video.addEventListener("loadeddata", function() {
        try { video.currentTime = 0.01; } catch(e) {}
        video.pause();
    });

    video.onerror = function() {
        container.innerHTML = "<p style='color:red;'>Video load error: " + videoPath + "</p>";
    };
}

</script>

</body>
</html>
