
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUWA Cloud – Domain & Power Plants Toggle</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:monospace; display:flex; height:100vh; }
.sidebar {
    width:260px; background:white; padding:16px;
    border-right:1px solid #ddd; display:flex; flex-direction:column; gap:10px;
}
.map-container { flex:1; }
#map { width:100%; height:100%; }

button {
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

#mexicoButton { background:#20c997; }
#plantsToggle { background:#6c757d; }

.legend {
    background:white;
    padding:8px;
    border-radius:6px;
    font-size:0.8rem;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.legend-item {
    display:flex;
    align-items:center;
    margin-bottom:4px;
}
.legend-color {
    width:12px;
    height:12px;
    margin-right:6px;
}
</style>
</head>

<body>

<div class="sidebar">
    <button id="mexicoButton">Mexico Domain</button>
    <button id="plantsToggle">Load Power Plants</button>
    <div><strong>Selected Domain:</strong></div>
    <div id="domain-info">None</div>
</div>

<div class="map-container">
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script>

const map = L.map('map', {center:[20,0], zoom:2});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:8}).addTo(map);

let bounds = null;
let plantsLayer = L.layerGroup();
let plantsLoaded = false;
let legendControl = null;

const fuelColors = {
    "Solar":"#f4c430",
    "Hydro":"#1f77b4",
    "Wind":"#2ca02c",
    "Gas":"#ff7f0e",
    "Oil":"#8c564b",
    "Coal":"#444444",
    "Biomass":"#9467bd",
    "Geothermal":"#d62728",
    "Nuclear":"#17becf"
};

function setMexicoDomain() {
    const south=16, west=-101, north=23, east=-89;
    const rect = L.rectangle([[south, west],[north, east]],{color:"#20c997"}).addTo(map);
    map.fitBounds(rect.getBounds());
    bounds = rect.getBounds();
    document.getElementById("domain-info").textContent =
        `N:${north} S:${south} E:${east} W:${west}`;
}

async function loadMexicoPlants() {
    const url = "https://datasette.io/global-power-plants/global-power-plants.json?country_long=Mexico&_size=max";
    const response = await fetch(url);
    const data = await response.json();

    const plants = data.rows.map(row =>
        Object.fromEntries(row.map((val,i)=>[data.columns[i],val]))
    );

    plantsLayer.clearLayers();

    plants.forEach(p=>{
        if(!p.latitude || !p.longitude) return;
        const color = fuelColors[p.primary_fuel] || "#000000";

        const marker = L.circleMarker(
            [p.latitude,p.longitude],
            {radius:4,color:color,fillColor:color,fillOpacity:0.8}
        );

        marker.bindPopup(
            `<strong>${p.name}</strong><br>
             Fuel: ${p.primary_fuel}<br>
             Capacity: ${p.capacity_mw} MW`
        );

        plantsLayer.addLayer(marker);
    });

    plantsLayer.addTo(map);
    addLegend();
}

function removePlants() {
    map.removeLayer(plantsLayer);
    plantsLayer.clearLayers();
    if(legendControl) map.removeControl(legendControl);
}

function addLegend() {
    if(legendControl) map.removeControl(legendControl);

    legendControl = L.control({position:"bottomright"});

    legendControl.onAdd = function(){
        const div = L.DomUtil.create("div","legend");
        div.innerHTML = "<strong>Fuel type</strong><br>";
        for(const fuel in fuelColors){
            div.innerHTML +=
                `<div class="legend-item">
                    <div class="legend-color" style="background:${fuelColors[fuel]}"></div>
                    ${fuel}
                </div>`;
        }
        return div;
    };

    legendControl.addTo(map);
}

document.getElementById("mexicoButton")
    .addEventListener("click", setMexicoDomain);

document.getElementById("plantsToggle")
    .addEventListener("click", async ()=>{
        if(!plantsLoaded){
            await loadMexicoPlants();
            plantsLoaded=true;
            document.getElementById("plantsToggle").textContent="Hide Power Plants";
        } else {
            removePlants();
            plantsLoaded=false;
            document.getElementById("plantsToggle").textContent="Load Power Plants";
        }
    });

</script>

</body>
</html>
